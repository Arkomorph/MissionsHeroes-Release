<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Generate PWA Icons</title>
<style>
  body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; text-align: center; }
  canvas { border: 1px solid #333; margin: 1rem; }
  button { padding: .75rem 1.5rem; font-size: 1rem; cursor: pointer; background: #00cfff; border: none; border-radius: 8px; color: #030810; font-weight: bold; margin: .5rem; }
  button:hover { background: #0088ff; }
  .row { display: flex; justify-content: center; align-items: end; gap: 2rem; flex-wrap: wrap; }
</style>
</head>
<body>
<h1>PWA Icon Generator</h1>
<p>Click the buttons below to download the PNG icons.</p>

<div class="row">
  <div>
    <h3>192 x 192</h3>
    <canvas id="c192" width="192" height="192"></canvas><br>
    <button onclick="download('c192', 'icon-192.png')">Download 192px</button>
  </div>
  <div>
    <h3>512 x 512</h3>
    <canvas id="c512" width="512" height="512"></canvas><br>
    <button onclick="download('c512', 'icon-512.png')">Download 512px</button>
  </div>
</div>

<h2 style="margin-top:3rem">OG Image (partage réseaux sociaux)</h2>
<div class="row">
  <div>
    <h3>1200 x 630</h3>
    <canvas id="cog" width="1200" height="630" style="max-width:100%;height:auto"></canvas><br>
    <button onclick="download('cog', 'og-image.png')">Download OG Image</button>
  </div>
</div>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.1875; // corner radius

  // Background with rounded corners
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fillStyle = '#030810';
  ctx.fill();

  // Subtle border
  ctx.beginPath();
  ctx.roundRect(s * 0.03, s * 0.03, s * 0.94, s * 0.94, r * 0.85);
  ctx.strokeStyle = '#0a2040';
  ctx.lineWidth = s * 0.004;
  ctx.stroke();

  // Lightning bolt
  const bolt = new Path2D();
  bolt.moveTo(s * 0.5625, s * 0.09375);  // top
  bolt.lineTo(s * 0.28125, s * 0.5625);   // mid-left
  bolt.lineTo(s * 0.46875, s * 0.5625);   // mid-center
  bolt.lineTo(s * 0.40625, s * 0.90625);  // bottom
  bolt.lineTo(s * 0.75, s * 0.375);       // mid-right-upper
  bolt.lineTo(s * 0.53125, s * 0.375);    // mid-center-upper
  bolt.closePath();

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, s);
  grad.addColorStop(0, '#00cfff');
  grad.addColorStop(1, '#0088ff');
  ctx.fillStyle = grad;
  ctx.fill(bolt);

  // Stroke
  ctx.strokeStyle = '#00cfff';
  ctx.lineWidth = s * 0.008;
  ctx.lineJoin = 'round';
  ctx.stroke(bolt);
}

function download(id, filename) {
  const canvas = document.getElementById(id);
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function drawOgImage(canvas) {
  const w = canvas.width;   // 1200
  const h = canvas.height;  // 630
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#030810';
  ctx.fillRect(0, 0, w, h);

  // Subtle border
  ctx.strokeStyle = '#0a2040';
  ctx.lineWidth = 2;
  ctx.strokeRect(16, 16, w - 32, h - 32);

  // Lightning bolt (left side, vertically centered)
  const boltSize = 280;
  const bx = 160;  // center x of bolt
  const by = h / 2; // center y
  const bolt = new Path2D();
  bolt.moveTo(bx + boltSize * 0.11,  by - boltSize * 0.45);
  bolt.lineTo(bx - boltSize * 0.2,   by + boltSize * 0.05);
  bolt.lineTo(bx - boltSize * 0.02,  by + boltSize * 0.05);
  bolt.lineTo(bx - boltSize * 0.08,  by + boltSize * 0.45);
  bolt.lineTo(bx + boltSize * 0.27,  by - boltSize * 0.15);
  bolt.lineTo(bx + boltSize * 0.07,  by - boltSize * 0.15);
  bolt.closePath();

  const grad = ctx.createLinearGradient(0, by - boltSize / 2, 0, by + boltSize / 2);
  grad.addColorStop(0, '#00cfff');
  grad.addColorStop(1, '#0088ff');
  ctx.fillStyle = grad;
  ctx.fill(bolt);
  ctx.strokeStyle = '#00cfff';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.stroke(bolt);

  // Glow effect behind bolt
  ctx.save();
  ctx.shadowColor = '#00cfff';
  ctx.shadowBlur = 40;
  ctx.fillStyle = grad;
  ctx.fill(bolt);
  ctx.restore();

  // Title text
  const tx = 380;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 72px Nunito, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('Missions Heroes', tx, h / 2 - 40);

  // Tagline
  ctx.fillStyle = '#00cfff';
  ctx.font = '28px "Share Tech Mono", monospace';
  ctx.fillText('Responsabilisation & autonomie', tx, h / 2 + 30);
  ctx.fillStyle = '#667788';
  ctx.font = '22px "Share Tech Mono", monospace';
  ctx.fillText('pour les enfants — zero compte, zero dependance', tx, h / 2 + 70);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
drawOgImage(document.getElementById('cog'));
</script>
</body>
</html>
